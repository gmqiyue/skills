# 开源项目源码注册表
#
# 添加新项目：在 projects 下追加条目，然后运行 pnpm sync
# 字段说明：
#   repo:   Git 仓库地址
#   ref:    跟踪的分支或标签（可选，默认 main）
#   sparse: 稀疏检出路径列表（可选，只拉取指定目录，节省磁盘）
#   skill:  技能创建状态 — pending / in-progress / done
#   notes:  备注

projects:
  vite:
    repo: https://github.com/vitejs/vite
    ref: main
    skill: pending

